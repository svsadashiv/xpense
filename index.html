<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xpense — Personal Finance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
  <div id="app">
    <!-- Auth screen -->
    <div id="auth-screen">
      <div class="auth-bg"></div>
      <div class="auth-content">
        <div class="auth-logo">
          <div class="logo-ring"></div>
          <div class="logo-circle">
            <span class="rupee-symbol">₹</span>
          </div>
        </div>
        <h1 class="auth-title">Xpense</h1>
        <p class="auth-subtitle">Your financial clarity</p>
        <div class="pin-dots" id="pin-dots">
          <span></span><span></span><span></span><span></span><span></span><span></span>
        </div>
        <p class="pin-label" id="pin-label">Enter PIN to continue</p>
        <div class="numpad">
          <button class="num-btn" data-num="1">1</button>
          <button class="num-btn" data-num="2">2</button>
          <button class="num-btn" data-num="3">3</button>
          <button class="num-btn" data-num="4">4</button>
          <button class="num-btn" data-num="5">5</button>
          <button class="num-btn" data-num="6">6</button>
          <button class="num-btn" data-num="7">7</button>
          <button class="num-btn" data-num="8">8</button>
          <button class="num-btn" data-num="9">9</button>
          <button class="num-btn empty"></button>
          <button class="num-btn" data-num="0">0</button>
          <button class="num-btn del-btn" id="del-btn">⌫</button>
        </div>
      </div>
    </div>

    <!-- Main app -->
    <div id="main-app">
      <!-- Sidebar nav -->
      <nav class="sidebar" id="sidebar">
        <div class="sidebar-logo">
          <div class="logo-mini">₹</div>
          <span>Xpense</span>
        </div>
        <div class="nav-items">
          <button class="nav-item active" data-tab="dashboard">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
            <span>Dashboard</span>
          </button>
          <button class="nav-item" data-tab="transactions">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 16V4m0 0L3 8m4-4 4 4M17 8v12m0 0 4-4m-4 4-4-4"/></svg>
            <span>Transactions</span>
          </button>
          <button class="nav-item" data-tab="loans">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 6v6l4 2"/></svg>
            <span>Loans</span>
          </button>
          <button class="nav-item" data-tab="cards">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>
            <span>Cards</span>
          </button>
          <button class="nav-item" data-tab="budget">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            <span>Budget</span>
          </button>
          <button class="nav-item" data-tab="goals">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
            <span>Goals</span>
          </button>
          <button class="nav-item" data-tab="summary">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>
            <span>Summary</span>
          </button>
          <button class="nav-item" data-tab="settings">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
            <span>Settings</span>
          </button>
        </div>
        <button class="lock-btn" id="lock-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <span>Lock</span>
        </button>
      </nav>

      <!-- Mobile top bar -->
      <div class="topbar">
        <button class="menu-btn" id="menu-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="topbar-logo">₹ Xpense</div>
        <button class="add-btn-top" id="add-btn-top">+</button>
      </div>

      <!-- Content area -->
      <main class="content" id="content">
        <!-- Tabs injected by JS -->
      </main>
    </div>
  </div>

  <!-- Modal overlay -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3 id="modal-title">Add Transaction</h3>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
